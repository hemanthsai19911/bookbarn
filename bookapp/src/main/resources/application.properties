# Server port
server.port=8080

# MySQL datasource

spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

# JWT secret
app.jwt.secret=${JWT_SECRET}

# Brevo (Sendinblue) Email API Configuration
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL:saibittu594@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:BookBarn}


# Disable noisy WebSocket info logs
logging.level.org.springframework.web.socket.config.WebSocketMessageBrokerStats=ERROR
